version: "2"
sql:
  - engine: "mysql"
    queries: "sql/query.sql"
    schema: "sql/schema.sql"
    gen:
      go:
        # package: "github.com/panxiao81/e5renew/internal/db"
        out: "internal/db"
  - engine: "postgresql"
    queries: "sql/query.sql"
    schema: "sql/schema-postgres.sql"
