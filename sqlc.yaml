version: "2"
sql:
  - engine: "mysql"
    queries: "sql/query.sql"
    schema: "sql/schema.sql"
    gen:
      go:
        out: "internal/db/mysql"
  - engine: "postgresql"
    queries: "sql/query.postgres.sql"
    schema: "sql/schema-postgres.sql"
    gen:
      go:
        out: "internal/db/postgres"
